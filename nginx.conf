server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves index.html so react-router
    # can resolve client-side routes on a full page load / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
